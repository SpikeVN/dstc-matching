<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tin nhắn mới — DSTC Matching</title>
</head>
<body style="margin:0;padding:0;background-color:#0a120b;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0a120b;padding:32px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background-color:#0f1a11;border:1px solid rgba(42,75,46,0.3);border-radius:16px;overflow:hidden;">

          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#1a3a1f 0%,#0f2514 100%);padding:32px 24px;text-align:center;">
              <p style="margin:0 0 8px;font-size:32px;">💬</p>
              <h1 style="margin:0;font-size:22px;font-weight:700;color:#71d65b;">Tin nhắn mới</h1>
              <p style="margin:8px 0 0;font-size:13px;color:rgba(255,255,255,0.6);">Từ {{ sender_name }}</p>
            </td>
          </tr>

          <!-- Message preview -->
          <tr>
            <td style="padding:24px;">
              <table width="100%" cellpadding="0" cellspacing="0" style="background-color:rgba(42,75,46,0.1);border:1px solid rgba(42,75,46,0.2);border-radius:12px;">
                <tr>
                  <td style="padding:20px;">
                    <table cellpadding="0" cellspacing="0">
                      <tr>
                        {% if sender_avatar %}
                        <td style="padding-right:16px;vertical-align:top;">
                          <img src="{{ sender_avatar }}" alt="" width="48" height="48" style="border-radius:10px;border:2px solid rgba(113,214,91,0.3);object-fit:cover;display:block;">
                        </td>
                        {% endif %}
                        <td style="vertical-align:top;">
                          <p style="margin:0;font-size:15px;font-weight:700;color:#e8f0e9;">{{ sender_name }}</p>
                          {% if sender_role %}
                          <p style="margin:4px 0 0;font-size:11px;color:#71d65b;">{{ sender_role }}</p>
                          {% endif %}
                        </td>
                      </tr>
                    </table>
                    <p style="margin:16px 0 0;font-size:14px;color:rgba(255,255,255,0.8);line-height:1.5;background-color:rgba(255,255,255,0.04);padding:12px 16px;border-radius:8px;border-left:3px solid #71d65b;">
                      "{{ message_preview }}{% if message_preview|length >= 150 %}…{% endif %}"
                    </p>
                  </td>
                </tr>
              </table>

              <!-- CTA button -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-top:24px;">
                <tr>
                  <td align="center">
                    <a href="{{ SITE_URL }}/messages?match={{ match_id }}"
                       style="display:inline-block;background-color:#71d65b;color:#0a120b;font-size:14px;font-weight:700;text-decoration:none;padding:12px 32px;border-radius:10px;">
                      Xem tin nhắn →
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:16px 24px;border-top:1px solid rgba(42,75,46,0.2);text-align:center;">
              <p style="margin:0;font-size:11px;color:rgba(255,255,255,0.3);">
                DSTC Matching — Data Science Talent Competition 2026
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
