version: "3.8"

networks:
  supabase-net:
    name: supabase-net
    driver: bridge

volumes:
  db-data:

services:
  # ──────────────────────────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────────────────────────
  supabase-db:
    image: docker.io/supabase/postgres:15.14.1.150
    container_name: supabase-db
    networks: [supabase-net]
    volumes:
      - db-data:/var/lib/postgresql/data:Z
      - ./volumes/db/init:/docker-entrypoint-initdb.d:Z
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: 3600
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────
  # GoTrue (Auth)
  # ──────────────────────────────────────────────────────────────
  supabase-auth:
    image: docker.io/supabase/gotrue:v2.193.1
    container_name: supabase-auth
    depends_on:
      supabase-db: { condition: service_healthy }
    networks: [supabase-net]
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://supabase_auth_admin:${POSTGRES_PASSWORD_ENCODED}@supabase-db:5432/postgres
      GOTRUE_SITE_URL: ${GOTRUE_SITE_URL:-http://localhost:4236}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP:-true}
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-true}
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: "true"
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: https://supabase.cteftu.id.vn/auth/v1/callback
      API_EXTERNAL_URL: https://supabase.cteftu.id.vn/auth/v1/
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-noreply@cteftu.id.vn}
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-smtp.resend.com}
      # Port 587 (STARTTLS). Port 465 (implicit SSL) makes GoTrue hang ~10s.
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-resend}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-"Data Science Talent Competition"}
      GOTRUE_MAILER_REDIRECT_URLS: ${GOTRUE_SITE_URL:-http://localhost:4236},${GOTRUE_SITE_URL:-http://localhost:4236}/reset-password,https://matching.cteftu.id.vn,https://matching.cteftu.id.vn/reset-password
      GOTRUE_MAILER_TEMPLATES_CONFIRMATION: http://host.containers.internal:8000/templates/confirmation.html
    ports:
      - "127.0.0.1:9999:9999"
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────
  # PostgREST (REST API for Studio)
  # ──────────────────────────────────────────────────────────────
  rest:
    image: docker.io/postgrest/postgrest:latest
    container_name: supabase-rest
    depends_on:
      supabase-db: { condition: service_healthy }
    networks: [supabase-net]
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD_ENCODED}@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_DB_MAX_ROWS: 1000
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────
  # Kong (API Gateway)
  # ──────────────────────────────────────────────────────────────
  kong:
    image: docker.io/kong/kong:latest
    container_name: supabase-kong
    depends_on:
      supabase-auth: { condition: service_started }
      rest: { condition: service_started }
    networks:
      supabase-net:
        aliases:
          - api-gw
    ports:
      - "127.0.0.1:8001:8000/tcp"
    volumes:
      - ./volumes/api/kong.yml:/home/kong/temp.yml:ro,z
      - ./volumes/api/kong-entrypoint.sh:/home/kong/kong-entrypoint.sh:ro,z
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_DNS_NOT_FOUND_TTL: 1
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth,request-termination
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      KONG_PROXY_ACCESS_LOG: /dev/stdout combined
      ANON_KEY: ${ANON_KEY}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-supabase}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    entrypoint: ["/bin/sh", "/home/kong/kong-entrypoint.sh"]
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────
  # PG Meta (database metadata — used by Studio's table editor)
  # ──────────────────────────────────────────────────────────────
  pg-meta:
    image: docker.io/supabase/postgres-meta:v0.96.6
    container_name: supabase-pg-meta
    depends_on:
      supabase-db: { condition: service_healthy }
    networks: [supabase-net]
    environment:
      PG_META_DB_URL: postgresql://postgres:${POSTGRES_PASSWORD_ENCODED}@supabase-db:5432/postgres
      CRYPTO_KEY: ${PG_META_CRYPTO_KEY}
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────
  # Studio (Dashboard)
  # ──────────────────────────────────────────────────────────────
  studio:
    image: docker.io/supabase/studio:2026.07.07-sha-a6a04f2
    container_name: supabase-studio
    depends_on:
      supabase-db: { condition: service_healthy }
      pg-meta: { condition: service_started }
      kong: { condition: service_started }
    networks: [supabase-net]
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      HOSTNAME: "0.0.0.0"
      STUDIO_PG_META_URL: http://supabase-pg-meta:8080
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:8001}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_ENCODED}
      POSTGRES_HOST: supabase-db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: postgres
      POSTGRES_USER_READ_WRITE: postgres
      PG_META_CRYPTO_KEY: ${PG_META_CRYPTO_KEY}
      DEFAULT_ORGANIZATION_NAME: "DSTC"
      DEFAULT_PROJECT_NAME: "Matching"
    restart: unless-stopped

