##
## Kong configuration for Supabase self-hosted
## Routes: Auth, PostgREST, Studio dashboard
##

_format_version: "3.0"

consumers:
  - username: anon
    keyauth_credentials:
      - key: "${SUPABASE_ANON_KEY}"
  - username: service_role
    keyauth_credentials:
      - key: "${SUPABASE_SERVICE_ROLE_KEY}"

acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: admin

services:
  ## Studio (dashboard) — unprotected
  - name: studio
    url: http://supabase-studio:3000/
    routes:
      - name: studio
        strip_path: false
        paths:
          - /
    plugins:
      - name: cors

  ## Auth — open routes (no key required)
  - name: auth-v1-open
    url: http://supabase-auth:9999/
    routes:
      - name: auth-v1-open
        strip_path: true
        paths:
          - /auth/v1/verify
          - /auth/v1/authorize
          - /auth/v1/callback
          - /auth/v1/.well-known
          - /auth/v1/health
    plugins:
      - name: cors

  ## Auth — secured routes
  - name: auth-v1
    url: http://supabase-auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
      - name: key-auth
      - name: request-transformer
        config:
          add:
            headers:
              - "Authorization: $LUA_AUTH_EXPR"
      - name: acl
        config:
          allow:
            - admin
            - anon

  ## PostgREST
  - name: rest-v1
    url: http://supabase-rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
      - name: key-auth
      - name: request-transformer
      - name: acl
        config:
          allow:
            - admin
            - anon

  ## GraphQL (via PostgREST)
  - name: graphql-v1
    url: http://supabase-rest:3000/rpc/graphql
    routes:
      - name: graphql-v1-all
        strip_path: true
        paths:
          - /graphql/v1
    plugins:
      - name: cors
      - name: key-auth
      - name: request-transformer
      - name: acl
        config:
          allow:
            - admin
            - anon
