##
## Kong configuration for Supabase self-hosted
## Routes: Auth, PostgREST, Studio dashboard
##

_format_version: "3.0"

consumers:
  - username: anon
    keyauth_credentials:
      - key: "${SUPABASE_ANON_KEY}"
  - username: service_role
    keyauth_credentials:
      - key: "${SUPABASE_SERVICE_ROLE_KEY}"

acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: admin

services:
  ## Studio (dashboard) — unprotected
  - name: studio
    url: http://supabase-studio:3000/
    routes:
      - name: studio
        strip_path: false
        paths:
          - /
    plugins:
      - name: cors

  ## Auth — open routes (no key required)
  ## One service per endpoint: the GoTrue path is baked into each service URL
  ## so strip_path strips the /auth/v1/<endpoint> prefix and leaves the correct
  ## suffix for GoTrue (e.g. /auth/v1/verify -> http://auth:9999/verify).
  - name: auth-v1-open-verify
    url: http://supabase-auth:9999/verify
    routes:
      - name: auth-v1-open-verify
        strip_path: true
        paths:
          - /auth/v1/verify
    plugins:
      - name: cors
  ## Short /verify route — GoTrue email links use API_EXTERNAL_URL host
  ## which produces https://supabase.cteftu.id.vn/verify?... (no /auth/v1/).
  ## This route catches those links and proxies to GoTrue's /verify.
  - name: auth-v1-open-verify-short
    url: http://supabase-auth:9999/verify
    routes:
      - name: auth-v1-open-verify-short
        strip_path: true
        paths:
          - /verify
    plugins:
      - name: cors
  - name: auth-v1-open-authorize
    url: http://supabase-auth:9999/authorize
    routes:
      - name: auth-v1-open-authorize
        strip_path: true
        paths:
          - /auth/v1/authorize
    plugins:
      - name: cors
  - name: auth-v1-open-callback
    url: http://supabase-auth:9999/callback
    routes:
      - name: auth-v1-open-callback
        strip_path: true
        paths:
          - /auth/v1/callback
    plugins:
      - name: cors
  - name: auth-v1-open-well-known
    url: http://supabase-auth:9999/.well-known
    routes:
      - name: auth-v1-open-well-known
        strip_path: true
        paths:
          - /auth/v1/.well-known
    plugins:
      - name: cors
  - name: auth-v1-open-health
    url: http://supabase-auth:9999/health
    routes:
      - name: auth-v1-open-health
        strip_path: true
        paths:
          - /auth/v1/health
    plugins:
      - name: cors

  ## Auth — secured routes
  - name: auth-v1
    url: http://supabase-auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
      - name: key-auth
      - name: request-transformer
        config:
          add:
            headers:
              - "Authorization: $LUA_AUTH_EXPR"
      - name: acl
        config:
          allow:
            - admin
            - anon

  ## PostgREST
  - name: rest-v1
    url: http://supabase-rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
      - name: key-auth
      - name: request-transformer
      - name: acl
        config:
          allow:
            - admin
            - anon

  ## GraphQL (via PostgREST)
  - name: graphql-v1
    url: http://supabase-rest:3000/rpc/graphql
    routes:
      - name: graphql-v1-all
        strip_path: true
        paths:
          - /graphql/v1
    plugins:
      - name: cors
      - name: key-auth
      - name: request-transformer
      - name: acl
        config:
          allow:
            - admin
            - anon

  ## PG Meta (database introspection — used by Studio)
  - name: pg-meta
    url: http://supabase-pg-meta:8080/
    routes:
      - name: pg-meta-all
        strip_path: true
        paths:
          - /pg-meta/
    plugins:
      - name: cors
      - name: key-auth
      - name: request-transformer
      - name: acl
        config:
          allow:
            - admin
            - anon
