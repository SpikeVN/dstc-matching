          <tr>
            <td style="background:linear-gradient(135deg,#1a3a1f 0%,#0f2514 100%);padding:32px 24px;text-align:center;">
              <p style="margin:0 0 8px;font-size:32px;">📧</p>
              <h1 style="margin:0;font-size:22px;font-weight:700;color:#71d65b;">Xác minh email</h1>
              <p style="margin:8px 0 0;font-size:13px;color:rgba(255,255,255,0.6);">Chào mừng bạn đến với DSTC 2026!</p>
