              </p>
              <table width="100%" cellpadding="0" cellspacing="0" style="background-color:rgba(42,75,46,0.1);border:1px solid rgba(42,75,46,0.2);border-radius:12px;margin-bottom:20px;">
                <tr>
                  <td style="padding:16px 20px;">
                    <p style="margin:0;font-size:12px;color:rgba(255,255,255,0.5);">Email</p>
                    <p style="margin:4px 0 0;font-size:14px;color:#e8f0e9;">{{ .Email }}</p>
                  </td>
                </tr>
              </table>
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block;background-color:#71d65b;color:#0a120b;font-size:14px;font-weight:700;text-decoration:none;padding:12px 32px;border-radius:10px;">Xác minh email ngay</a>
